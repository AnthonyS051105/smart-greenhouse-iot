; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

; Environment tersedia:
;   main         -> firmware ESP32 utama (DHT11 + soil moisture + BH1750 + servo + MQTT closed-loop)
;   esp32cam     -> firmware ESP32-CAM (ambil citra + upload ke backend)
;   test-dht11         -> debug sensor DHT11 saja
;   test-servo         -> debug servo saja
;   test-soil-moisture -> debug Capacitive Soil Moisture Sensor v1.2 saja
;   test-bh1750        -> debug sensor cahaya BH1750 saja
;   test-wifi-mqtt -> debug koneksi WiFi + MQTT (HiveMQ Cloud) saja
;   test-camera  -> debug ESP32-CAM saja (init + capture)
;
; Jalankan salah satu env, contoh:
;   pio run -e main -t upload -t monitor
;   pio run -e test-dht11 -t upload -t monitor

[env]
platform = espressif32
framework = arduino
monitor_speed = 115200
lib_deps =
	knolleary/PubSubClient@^2.8
	bblanchon/ArduinoJson@^7.0.4
	adafruit/DHT sensor library@^1.4.6
	adafruit/Adafruit Unified Sensor@^1.1.14
	madhephaestus/ESP32Servo@^3.0.5
	claws/BH1750@^1.3.0

; ---------- Firmware utama (ESP32 DevKit) ----------
[env:main]
board = esp32doit-devkit-v1
build_src_filter =
	+<*>
	-<esp32cam/>
	-<camtest/>
	-<tests/>

; ---------- Firmware ESP32-CAM (AI-Thinker) ----------
[env:esp32cam]
board = esp32cam
build_src_filter =
	+<esp32cam/>
	+<WifiManager.cpp>
	+<CameraCapture.cpp>
	+<HttpUploader.cpp>
	-<main/>
	-<tests/>
	-<camtest/>

; ---------- Test per-komponen (semua di board ESP32 utama, kecuali dicatat) ----------
[env:test-dht11]
board = esp32doit-devkit-v1
build_src_filter =
	+<tests/test_dht11.cpp>
	-<main/>
	-<esp32cam/>
	-<camtest/>
	-<tests/test_servo.cpp>
	-<tests/test_soil_moisture.cpp>
	-<tests/test_bh1750.cpp>
	-<tests/test_wifi_mqtt.cpp>
	-<tests/test_camera.cpp>

[env:test-servo]
board = esp32doit-devkit-v1
build_src_filter =
	+<tests/test_servo.cpp>
	+<ActuatorManager.cpp>
	-<main/>
	-<esp32cam/>
	-<camtest/>
	-<tests/test_dht11.cpp>
	-<tests/test_soil_moisture.cpp>
	-<tests/test_bh1750.cpp>
	-<tests/test_wifi_mqtt.cpp>
	-<tests/test_camera.cpp>

[env:test-soil-moisture]
board = esp32doit-devkit-v1
build_src_filter =
	+<tests/test_soil_moisture.cpp>
	+<SoilMoistureManager.cpp>
	-<main/>
	-<esp32cam/>
	-<camtest/>
	-<tests/test_dht11.cpp>
	-<tests/test_servo.cpp>
	-<tests/test_bh1750.cpp>
	-<tests/test_wifi_mqtt.cpp>
	-<tests/test_camera.cpp>

[env:test-bh1750]
board = esp32doit-devkit-v1
build_src_filter =
	+<tests/test_bh1750.cpp>
	+<LightManager.cpp>
	-<main/>
	-<esp32cam/>
	-<camtest/>
	-<tests/test_dht11.cpp>
	-<tests/test_servo.cpp>
	-<tests/test_soil_moisture.cpp>
	-<tests/test_wifi_mqtt.cpp>
	-<tests/test_camera.cpp>

[env:test-wifi-mqtt]
board = esp32doit-devkit-v1
build_src_filter =
	+<tests/test_wifi_mqtt.cpp>
	-<main/>
	-<esp32cam/>
	-<camtest/>
	-<tests/test_dht11.cpp>
	-<tests/test_servo.cpp>
	-<tests/test_soil_moisture.cpp>
	-<tests/test_bh1750.cpp>
	-<tests/test_camera.cpp>

; ESP32-CAM board -- debug kamera saja
[env:test-camera]
board = esp32cam
build_src_filter =
	+<tests/test_camera.cpp>
	+<CameraCapture.cpp>
	-<main/>
	-<esp32cam/>
	-<camtest/>
	-<tests/test_dht11.cpp>
	-<tests/test_servo.cpp>
	-<tests/test_wifi_mqtt.cpp>

; DIAGNOSTIK: sama seperti test-camera tapi baud rendah (9600) untuk
; membedakan noise sinyal/chip USB-Serial vs bug software (lihat CLAUDE.md).
; Hapus env ini setelah masalah Serial Monitor ESP32-CAM terselesaikan.
[env:test-camera-diag]
board = esp32cam
monitor_speed = 9600
build_flags = -D DIAG_BAUD_9600
build_src_filter =
	+<tests/test_camera.cpp>
	+<CameraCapture.cpp>
	-<main/>
	-<esp32cam/>
	-<camtest/>
	-<tests/test_dht11.cpp>
	-<tests/test_servo.cpp>
	-<tests/test_wifi_mqtt.cpp>

; DIAGNOSTIK: web MJPEG stream server, TIDAK bergantung Serial Monitor sama
; sekali -- buktikan kamera+board fisik berfungsi via browser. Lihat
; src/camtest/main.cpp untuk detail & cara pakai. Hapus setelah diagnosis
; Serial Monitor selesai (bukan bagian firmware produksi).
[env:camtest]
board = esp32cam
build_src_filter =
	+<camtest/>
	+<CameraCapture.cpp>
	-<main/>
	-<esp32cam/>
	-<tests/>
